<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Den.deal 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR','Inter',sans-serif;background:#F0F1F5;color:#2D3436}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit}

/* ===== LOGIN ===== */
#loginScreen{
  position:fixed;inset:0;z-index:9999;
  background:#F0F1F5;
  display:flex;align-items:center;justify-content:center;
}
.login-card{width:100%;max-width:360px;padding:40px 24px;text-align:center}
.login-logo{font-size:28px;font-weight:700;margin-bottom:4px}
.login-logo .d{color:#2D3436}.login-logo .dot{color:#2563EB}
.login-sub{font-size:13px;color:#9CA3AF;margin-bottom:32px}
.login-input{
  display:block;width:100%;padding:14px 16px;margin-bottom:12px;
  border:1px solid #E5E7EB;border-radius:10px;font-size:14px;
  outline:none;transition:border .2s;
}
.login-input:focus{border-color:#0B6954}
.login-btn{
  display:block;width:100%;padding:14px;margin-top:4px;
  background:#0B6954;color:#fff;border-radius:10px;
  font-size:15px;font-weight:600;transition:background .2s;
}
.login-btn:hover{background:#095443}
.login-err{color:#ef4444;font-size:12px;margin-top:8px;min-height:18px}

/* ===== APP ===== */
#appShell{
  display:none;
  position:fixed;inset:0;z-index:1000;
  justify-content:center;background:#F0F1F5;
}
.app-frame{
  width:100%;max-width:480px;height:100%;
  display:flex;flex-direction:column;
  background:#fff;position:relative;
  box-shadow:0 0 40px rgba(0,0,0,.08);
}

/* Top Bar */
.topbar{
  height:52px;background:#fff;
  border-bottom:1px solid #f0f0f0;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;
}
.topbar-logo{font-size:18px;font-weight:700}
.topbar-logo .dot{color:#2563EB}
.topbar-btn{
  font-size:12px;color:#9CA3AF;padding:5px 12px;
  border:1px solid #E5E7EB;border-radius:16px;
}
.topbar-btn:hover{color:#4B5563;border-color:#D1D5DB}

/* Content */
.content{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;display:none}
.panel.active{display:block}

/* Bottom Tabs */
.bottombar{
  height:60px;background:#fff;
  border-top:1px solid #E5E7EB;
  display:flex;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.tab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
}
.tab-icon{font-size:20px;opacity:.35;transition:all .2s}
.tab-text{font-size:10px;color:#9CA3AF;font-weight:500;transition:color .2s}
.tab.on .tab-icon{opacity:1}
.tab.on .tab-text{color:#0B6954;font-weight:600}

/* ===== 홈화면 ===== */
.home{padding:20px 16px}
.home-welcome{
  background:linear-gradient(135deg,#0B6954,#0d7d64);
  border-radius:16px;padding:24px 20px;color:#fff;margin-bottom:20px;
}
.home-welcome h2{font-size:18px;font-weight:700;margin-bottom:4px}
.home-welcome p{font-size:13px;opacity:.8}
.home-domain{
  display:flex;align-items:center;gap:8px;margin-top:12px;
  background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;
}
.home-domain span{font-size:13px;flex:1}
.home-domain button{
  font-size:11px;color:#fff;padding:4px 12px;
  border:1px solid rgba(255,255,255,.4);border-radius:10px;background:none;
}
.home-shortcuts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.shortcut{
  background:#f9fafb;border-radius:14px;padding:20px 10px;
  text-align:center;border:1px solid #f3f4f6;transition:all .15s;
}
.shortcut:active{transform:scale(.96)}
.shortcut-icon{font-size:30px;margin-bottom:8px}
.shortcut-label{font-size:12px;font-weight:600;color:#374151}
.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:#ECFDF5;border-radius:12px;padding:16px 8px;text-align:center}
.stat-val{font-size:24px;font-weight:700;color:#0B6954}
.stat-lbl{font-size:11px;color:#6B7280;margin-top:2px}

/* ===== 홈페이지 편집 ===== */
.edit{padding:20px 16px}
.edit h2{font-size:17px;font-weight:700;margin-bottom:16px}
.edit-section{
  background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:12px;
  border:1px solid #f3f4f6;
}
.edit-section-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.edit-field{margin-bottom:12px}
.edit-field label{display:block;font-size:12px;color:#6B7280;margin-bottom:4px;font-weight:500}
.edit-field input,.edit-field textarea,.edit-field select{
  width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;
  font-size:13px;outline:none;resize:vertical;
}
.edit-field input:focus,.edit-field textarea:focus{border-color:#0B6954}
.edit-save{
  display:block;width:100%;padding:13px;margin-top:8px;
  background:#0B6954;color:#fff;border-radius:10px;
  font-size:14px;font-weight:600;
}
.edit-save:hover{background:#095443}

/* ===== 회원문의관리 ===== */
.inq{padding:20px 16px}
.inq-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.inq-header h2{font-size:17px;font-weight:700}
.inq-badge{
  background:#0B6954;color:#fff;font-size:11px;font-weight:600;
  padding:3px 10px;border-radius:10px;
}
.inq-empty{text-align:center;padding:50px 0;color:#9CA3AF}
.inq-empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.inq-empty-text{font-size:14px}
.inq-item{
  background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:10px;
  border:1px solid #f3f4f6;cursor:pointer;transition:all .15s;
}
.inq-item:hover{background:#f3f4f6}
.inq-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.inq-item-name{font-size:14px;font-weight:600}
.inq-item-date{font-size:11px;color:#9CA3AF}
.inq-item-msg{font-size:13px;color:#6B7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inq-item-detail{
  display:none;margin-top:12px;padding-top:12px;
  border-top:1px solid #E5E7EB;font-size:13px;color:#374151;line-height:1.7;
}
.inq-item.open .inq-item-msg{white-space:normal}
.inq-item.open .inq-item-detail{display:block}
.inq-item-status{
  font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;
}
.status-new{background:#FEF3C7;color:#92400E}
.status-done{background:#D1FAE5;color:#065F46}

/* ===== 미리보기 ===== */
.preview{padding:20px 16px}
.preview h2{font-size:17px;font-weight:700;margin-bottom:16px}
.preview-card{
  background:#f9fafb;border-radius:14px;overflow:hidden;
  border:1px solid #f3f4f6;margin-bottom:16px;
}
.preview-browser{
  background:#2D3436;padding:8px 14px;
  display:flex;align-items:center;gap:6px;
}
.preview-dot{width:8px;height:8px;border-radius:50%}
.preview-dot.r{background:#ff5f57}.preview-dot.y{background:#ffbd2e}.preview-dot.g{background:#28c840}
.preview-url{
  flex:1;margin-left:8px;background:#1a1a2e;border-radius:4px;
  padding:4px 10px;font-size:11px;color:#9CA3AF;
}
.preview-body{
  height:320px;display:flex;align-items:center;justify-content:center;
  background:#fff;
}
.preview-body iframe{width:100%;height:100%;border:none}
.preview-actions{display:flex;gap:10px;margin-top:4px}
.preview-btn{
  flex:1;padding:13px;border-radius:10px;font-size:13px;font-weight:600;
  text-align:center;
}
.preview-btn.primary{background:#0B6954;color:#fff}
.preview-btn.secondary{background:#f3f4f6;color:#374151}
.preview-btn:hover{opacity:.9}

/* ===== PC 배경 ===== */
.pc-bg{
  position:fixed;top:50%;left:calc((50% - 240px)/2);
  transform:translate(-50%,-50%);z-index:999;pointer-events:none;text-align:center;
}
.pc-bg .brand{font-size:36px;font-weight:800;color:#2D3436}
.pc-bg .brand .dot{color:#2563EB}
.pc-bg .sub{font-size:11px;color:#9CA3AF;margin-top:6px}
@media(max-width:1080px){.pc-bg{display:none}}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1F2937;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:all .3s;z-index:99999;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span class="d">Den</span><span class="dot">.</span><span class="d">deal</span></div>
    <p class="login-sub">관리자 로그인</p>
    <div>
      <input class="login-input" type="text" id="inpId" placeholder="아이디">
      <input class="login-input" type="password" id="inpPw" placeholder="비밀번호">
      <button class="login-btn" type="button" onclick="window._doLogin()">로그인</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <div class="pc-bg">
    <div class="brand">Den<span class="dot">.</span>deal</div>
    <div class="sub">치과 디지털 플랫폼</div>
  </div>

  <div class="app-frame">
    <div class="topbar">
      <div class="topbar-logo">Den<span class="dot">.</span>deal</div>
      <button class="topbar-btn" onclick="window._logout()">로그아웃</button>
    </div>

    <div class="content">
      <!-- 홈화면 -->
      <div class="panel active" id="panelHome">
        <div class="home">
          <div class="home-welcome">
            <h2>안녕하세요, 관리자님</h2>
            <p>오늘도 Den.deal과 함께하세요</p>
            <div class="home-domain">
              <span>dendeal.kr</span>
              <button onclick="window._copyLink()">링크복사</button>
            </div>
          </div>
          <div class="home-shortcuts">
            <button class="shortcut" onclick="window._switchTab(1)">
              <div class="shortcut-icon">✏️</div>
              <div class="shortcut-label">홈페이지 편집</div>
            </button>
            <button class="shortcut" onclick="window._switchTab(2)">
              <div class="shortcut-icon">💬</div>
              <div class="shortcut-label">회원문의</div>
            </button>
            <button class="shortcut" onclick="window._switchTab(3)">
              <div class="shortcut-icon">👁️</div>
              <div class="shortcut-label">미리보기</div>
            </button>
          </div>
          <div class="home-stats">
            <div class="stat"><div class="stat-val" id="sInq">0</div><div class="stat-lbl">문의 접수</div></div>
            <div class="stat"><div class="stat-val" id="sPopup">0</div><div class="stat-lbl">활성 팝업</div></div>
            <div class="stat"><div class="stat-val" id="sImg">0</div><div class="stat-lbl">등록 이미지</div></div>
          </div>
        </div>
      </div>

      <!-- 홈페이지 편집 -->
      <div class="panel" id="panelEdit">
        <div class="edit">
          <h2>✏️ 홈페이지 편집</h2>
          <div class="edit-section">
            <div class="edit-section-title">📌 기본 정보</div>
            <div class="edit-field">
              <label>치과 이름</label>
              <input type="text" id="editName" placeholder="치과 이름을 입력하세요">
            </div>
            <div class="edit-field">
              <label>전화번호</label>
              <input type="tel" id="editPhone" placeholder="031-000-0000">
            </div>
            <div class="edit-field">
              <label>주소</label>
              <input type="text" id="editAddr" placeholder="주소를 입력하세요">
            </div>
          </div>
          <div class="edit-section">
            <div class="edit-section-title">🕐 진료시간</div>
            <div class="edit-field">
              <label>평일</label>
              <input type="text" id="editWeekday" placeholder="09:00 ~ 18:00">
            </div>
            <div class="edit-field">
              <label>토요일</label>
              <input type="text" id="editSat" placeholder="09:00 ~ 13:00">
            </div>
            <div class="edit-field">
              <label>점심시간</label>
              <input type="text" id="editLunch" placeholder="13:00 ~ 14:00">
            </div>
          </div>
          <div class="edit-section">
            <div class="edit-section-title">📝 소개글</div>
            <div class="edit-field">
              <label>홈페이지 소개</label>
              <textarea id="editIntro" rows="4" placeholder="홈페이지에 표시될 소개글을 입력하세요"></textarea>
            </div>
          </div>
          <button class="edit-save" onclick="window._saveEdit()">저장하기</button>
        </div>
      </div>

      <!-- 회원문의관리 -->
      <div class="panel" id="panelInq">
        <div class="inq">
          <div class="inq-header">
            <h2>💬 회원문의관리</h2>
            <span class="inq-badge" id="inqBadge">0건</span>
          </div>
          <div id="inqList"></div>
        </div>
      </div>

      <!-- 미리보기 -->
      <div class="panel" id="panelPreview">
        <div class="preview">
          <h2>👁️ 홈페이지 미리보기</h2>
          <div class="preview-card">
            <div class="preview-browser">
              <div class="preview-dot r"></div>
              <div class="preview-dot y"></div>
              <div class="preview-dot g"></div>
              <div class="preview-url">dendeal.kr</div>
            </div>
            <div class="preview-body">
              <iframe src="https://dendeal.kr" id="previewFrame"></iframe>
            </div>
          </div>
          <div class="preview-actions">
            <button class="preview-btn secondary" onclick="document.getElementById('previewFrame').src='https://dendeal.kr'">🔄 새로고침</button>
            <button class="preview-btn primary" onclick="window.open('https://dendeal.kr','_blank')">🔗 새 탭에서 열기</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Tabs -->
    <div class="bottombar">
      <button class="tab on" onclick="window._switchTab(0)"><span class="tab-icon">🏠</span><span class="tab-text">홈</span></button>
      <button class="tab" onclick="window._switchTab(1)"><span class="tab-icon">✏️</span><span class="tab-text">편집</span></button>
      <button class="tab" onclick="window._switchTab(2)"><span class="tab-icon">💬</span><span class="tab-text">문의</span></button>
      <button class="tab" onclick="window._switchTab(3)"><span class="tab-icon">👁️</span><span class="tab-text">미리보기</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var ID='admin',PW='admin123';
  var loginScreen=document.getElementById('loginScreen');
  var appShell=document.getElementById('appShell');
  var loginErr=document.getElementById('loginErr');
  var toastEl=document.getElementById('toast');
  var panels=[
    document.getElementById('panelHome'),
    document.getElementById('panelEdit'),
    document.getElementById('panelInq'),
    document.getElementById('panelPreview')
  ];
  var tabs=document.querySelectorAll('.tab');

  function toast(msg){
    toastEl.textContent=msg;
    toastEl.classList.add('show');
    setTimeout(function(){toastEl.classList.remove('show')},2000);
  }

  // 탭 전환
  window._switchTab=function(idx){
    panels.forEach(function(p,i){p.classList.toggle('active',i===idx)});
    tabs.forEach(function(t,i){t.classList.toggle('on',i===idx)});
    if(idx===0) refreshStats();
    if(idx===2) refreshInq();
  };

  // 로그인
  window._doLogin=function(){
    var id=document.getElementById('inpId').value.trim();
    var pw=document.getElementById('inpPw').value;
    if(id===ID&&pw===PW){
      sessionStorage.setItem('dd_admin','1');
      loginScreen.style.display='none';
      appShell.style.display='flex';
      refreshStats();
      toast('로그인되었습니다');
    }else{
      loginErr.textContent='아이디 또는 비밀번호가 올바르지 않습니다.';
      document.getElementById('inpPw').value='';
      document.getElementById('inpPw').focus();
    }
  };
  document.getElementById('inpPw').addEventListener('keydown',function(e){if(e.key==='Enter')window._doLogin()});
  document.getElementById('inpId').addEventListener('keydown',function(e){if(e.key==='Enter')window._doLogin()});

  // 로그아웃
  window._logout=function(){
    if(confirm('로그아웃 하시겠습니까?')){
      sessionStorage.removeItem('dd_admin');
      location.reload();
    }
  };

  // 링크복사
  window._copyLink=function(){
    var url='https://dendeal.kr';
    if(navigator.clipboard){
      navigator.clipboard.writeText(url).then(function(){toast('링크가 복사되었습니다')});
    }else{
      var ta=document.createElement('textarea');ta.value=url;
      document.body.appendChild(ta);ta.select();document.execCommand('copy');
      document.body.removeChild(ta);toast('링크가 복사되었습니다');
    }
  };

  // 편집 저장
  window._saveEdit=function(){
    var data={
      name:document.getElementById('editName').value,
      phone:document.getElementById('editPhone').value,
      addr:document.getElementById('editAddr').value,
      weekday:document.getElementById('editWeekday').value,
      sat:document.getElementById('editSat').value,
      lunch:document.getElementById('editLunch').value,
      intro:document.getElementById('editIntro').value
    };
    localStorage.setItem('siteEdit',JSON.stringify(data));
    toast('저장되었습니다');
  };
  function loadEdit(){
    var d=JSON.parse(localStorage.getItem('siteEdit')||'{}');
    if(d.name)document.getElementById('editName').value=d.name;
    if(d.phone)document.getElementById('editPhone').value=d.phone;
    if(d.addr)document.getElementById('editAddr').value=d.addr;
    if(d.weekday)document.getElementById('editWeekday').value=d.weekday;
    if(d.sat)document.getElementById('editSat').value=d.sat;
    if(d.lunch)document.getElementById('editLunch').value=d.lunch;
    if(d.intro)document.getElementById('editIntro').value=d.intro;
  }

  // 통계
  function refreshStats(){
    var inqs=JSON.parse(localStorage.getItem('inquiries')||'[]');
    var pops=JSON.parse(localStorage.getItem('adminPopups')||'[]').filter(function(p){return p.active});
    var imgs=JSON.parse(localStorage.getItem('adminImages')||'{}');
    document.getElementById('sInq').textContent=inqs.length;
    document.getElementById('sPopup').textContent=pops.length;
    document.getElementById('sImg').textContent=Object.keys(imgs).length;
  }

  // 문의목록
  function refreshInq(){
    var inqs=JSON.parse(localStorage.getItem('inquiries')||'[]');
    var el=document.getElementById('inqList');
    document.getElementById('inqBadge').textContent=inqs.length+'건';
    if(!inqs.length){
      el.innerHTML='<div class="inq-empty"><div class="inq-empty-icon">📭</div><div class="inq-empty-text">접수된 문의가 없습니다</div></div>';
      return;
    }
    var html='';
    inqs.forEach(function(q){
      var st=q.status==='done'?'done':'new';
      html+='<div class="inq-item" onclick="this.classList.toggle(\'open\')">'
        +'<div class="inq-item-top">'
        +'<span class="inq-item-name">'+(q.name||'익명')+'</span>'
        +'<span class="inq-item-status status-'+st+'">'+(st==='done'?'답변완료':'새문의')+'</span>'
        +'</div>'
        +'<div style="font-size:11px;color:#9CA3AF;margin-bottom:4px">'+(q.date||'')+'</div>'
        +'<div class="inq-item-msg">'+(q.message||q.msg||'')+'</div>'
        +'<div class="inq-item-detail">'
        +(q.phone?'📞 '+q.phone+'<br>':'')
        +(q.email?'✉️ '+q.email+'<br>':'')
        +'<br>'+(q.message||q.msg||'')
        +'</div></div>';
    });
    el.innerHTML=html;
  }

  // 초기화
  loadEdit();
  if(sessionStorage.getItem('dd_admin')==='1'){
    loginScreen.style.display='none';
    appShell.style.display='flex';
    refreshStats();
  }
})();
</script>
</body>
</html>
